apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sapientia

resources:
  - namespace.yaml
  - configmap.yaml
  - postgres.yaml
  - redis.yaml
  - object-storage.yaml
  - jobs.yaml
  - api.yaml
  - worker.yaml
  - web.yaml
  - ingress.yaml

images:
  - name: ghcr.io/terenceliu98/sapientia-api
    newTag: latest
  - name: ghcr.io/terenceliu98/sapientia-web
    newTag: latest
