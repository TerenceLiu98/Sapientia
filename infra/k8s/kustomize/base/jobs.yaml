apiVersion: batch/v1
kind: Job
metadata:
  name: object-storage-init
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: object-storage-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: object-storage-init
          image: amazon/aws-cli:latest
          command: ["/bin/sh", "-c"]
          args:
            - >
              until aws --endpoint-url http://object-storage:9000 s3api list-buckets >/dev/null 2>&1; do
                sleep 2;
              done;
              aws --endpoint-url http://object-storage:9000 s3api head-bucket --bucket "$S3_BUCKET"
              || aws --endpoint-url http://object-storage:9000 s3 mb "s3://$S3_BUCKET"
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: sapientia-secrets
                  key: S3_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: sapientia-secrets
                  key: S3_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: S3_REGION
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: S3_BUCKET
---
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: pgvector/pgvector:pg16
          command: ["sh", "-c", "until pg_isready -h postgres -U sapientia -d sapientia; do sleep 2; done"]
      containers:
        - name: migrate
          image: ghcr.io/terenceliu98/sapientia-api:latest
          command: ["pnpm", "--filter", "@sapientia/db", "db:migrate"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sapientia-secrets
                  key: DATABASE_URL
