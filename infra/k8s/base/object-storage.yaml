apiVersion: v1
kind: Service
metadata:
  name: object-storage
spec:
  ports:
    - name: s3
      port: 9000
      targetPort: s3
    - name: console
      port: 9001
      targetPort: console
  selector:
    app.kubernetes.io/name: object-storage
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: object-storage
spec:
  serviceName: object-storage
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: object-storage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: object-storage
    spec:
      securityContext:
        fsGroup: 10001
      initContainers:
        - name: volume-permissions
          image: alpine:3.21
          command: ["sh", "-c", "chown -R 10001:10001 /data /logs"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
      containers:
        - name: object-storage
          image: rustfs/rustfs:latest
          command: ["/bin/sh", "-c"]
          args:
            - >
              exec rustfs --address :9000 --console-enable
              --server-domains "$S3_SERVER_DOMAINS"
              --access-key "$S3_ACCESS_KEY_ID"
              --secret-key "$S3_SECRET_ACCESS_KEY"
              /data
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: sapientia-secrets
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: s3
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
    - metadata:
        name: logs
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
