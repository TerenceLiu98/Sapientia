apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
    spec:
      initContainers:
        - name: wait-for-postgres
          image: pgvector/pgvector:pg16
          command: ["sh", "-c", "until pg_isready -h postgres -U sapientia -d sapientia; do sleep 2; done"]
        - name: wait-for-redis
          image: redis:7-alpine
          command: ["sh", "-c", "until redis-cli -h redis ping; do sleep 2; done"]
        - name: wait-for-object-storage
          image: curlimages/curl:8.16.0
          command: ["sh", "-c", "until curl -fsS http://object-storage:9000/ >/dev/null; do sleep 2; done"]
      containers:
        - name: worker
          image: ghcr.io/terenceliu98/sapientia-api:latest
          command: ["pnpm", "--filter", "@sapientia/api", "worker:start"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: sapientia-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
