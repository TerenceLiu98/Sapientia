apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: sapientia
spec:
  ports:
    - name: http
      port: 3000
      targetPort: http
  selector:
    app.kubernetes.io/name: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: sapientia
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
    spec:
      initContainers:
        - name: wait-for-postgres
          image: pgvector/pgvector:pg16
          command: ["sh", "-c", "until pg_isready -h postgres -U sapientia -d sapientia; do sleep 2; done"]
        - name: wait-for-redis
          image: redis:7-alpine
          command: ["sh", "-c", "until redis-cli -h redis ping; do sleep 2; done"]
        - name: wait-for-object-storage
          image: curlimages/curl:8.16.0
          command: ["sh", "-c", "until curl -fsS http://object-storage:9000/ >/dev/null; do sleep 2; done"]
      containers:
        - name: api
          image: ghcr.io/terenceliu98/sapientia-api:latest
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: sapientia-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: sapientia
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
    spec:
      initContainers:
        - name: wait-for-postgres
          image: pgvector/pgvector:pg16
          command: ["sh", "-c", "until pg_isready -h postgres -U sapientia -d sapientia; do sleep 2; done"]
        - name: wait-for-redis
          image: redis:7-alpine
          command: ["sh", "-c", "until redis-cli -h redis ping; do sleep 2; done"]
        - name: wait-for-object-storage
          image: curlimages/curl:8.16.0
          command: ["sh", "-c", "until curl -fsS http://object-storage:9000/ >/dev/null; do sleep 2; done"]
      containers:
        - name: worker
          image: ghcr.io/terenceliu98/sapientia-api:latest
          command: ["pnpm", "--filter", "@sapientia/api", "worker:start"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: sapientia-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: sapientia
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: sapientia
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
    spec:
      containers:
        - name: web
          image: ghcr.io/terenceliu98/sapientia-web:latest
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
