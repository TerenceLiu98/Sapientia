apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: sapientia
data:
  NODE_ENV: production
  LOG_LEVEL: info
  PORT: "3000"
  REDIS_URL: redis://redis:6379
  S3_ENDPOINT: http://object-storage:9000
  S3_PUBLIC_ENDPOINT: http://s3.sapientia.local
  S3_BUCKET: sapientia
  S3_REGION: us-east-1
  S3_FORCE_PATH_STYLE: "true"
  BETTER_AUTH_URL: http://sapientia.local
  FRONTEND_ORIGIN: http://sapientia.local
  MINERU_BASE_URL: https://mineru.net
  S3_SERVER_DOMAINS: s3.sapientia.local,object-storage,object-storage.sapientia.svc.cluster.local
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: sapientia
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
    CREATE EXTENSION IF NOT EXISTS pg_trgm;
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: sapientia
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      client_max_body_size 128m;

      location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
      }

      location /health {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
