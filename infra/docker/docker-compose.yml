name: sapientia

x-app-env: &app-env
  NODE_ENV: production
  LOG_LEVEL: ${LOG_LEVEL:-info}
  PORT: 3000
  DATABASE_URL: postgresql://sapientia:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/${POSTGRES_DB:-sapientia}
  REDIS_URL: redis://redis:6379
  S3_ENDPOINT: http://object-storage:9000
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-sapientia_s3}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-sapientia_s3_password}
  S3_BUCKET: ${S3_BUCKET:-sapientia}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_FORCE_PATH_STYLE: "true"
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change_me_to_a_real_secret_at_least_32_chars}
  BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:8080}
  FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
  MINERU_BASE_URL: ${MINERU_BASE_URL:-https://mineru.net}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
  SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: sapientia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-sapientia}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sapientia -d ${POSTGRES_DB:-sapientia}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  object-storage-perms:
    image: alpine:3.21
    user: root
    volumes:
      - object_storage_data:/data
      - object_storage_logs:/logs
    command: sh -c "chown -R 10001:10001 /data /logs"
    restart: "no"

  object-storage:
    image: rustfs/rustfs:${S3_STORAGE_IMAGE_TAG:-latest}
    restart: unless-stopped
    command:
      - --address
      - :9000
      - --console-enable
      - --server-domains
      - ${S3_SERVER_DOMAINS:-localhost,object-storage}
      - --access-key
      - ${S3_ACCESS_KEY_ID:-sapientia_s3}
      - --secret-key
      - ${S3_SECRET_ACCESS_KEY:-sapientia_s3_password}
      - /data
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - object_storage_data:/data
      - object_storage_logs:/logs
    depends_on:
      object-storage-perms:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:9000/ >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  object-storage-init:
    image: amazon/aws-cli:latest
    depends_on:
      object-storage:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-sapientia_s3}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-sapientia_s3_password}
      AWS_DEFAULT_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-sapientia}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "aws --endpoint-url http://object-storage:9000 s3api head-bucket --bucket \"$${S3_BUCKET}\"
      || aws --endpoint-url http://object-storage:9000 s3 mb \"s3://$${S3_BUCKET}\""
    restart: "no"

  migrate:
    image: ${API_IMAGE:-sapientia-api:local}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    command: pnpm --filter @sapientia/db db:migrate
    environment:
      DATABASE_URL: postgresql://sapientia:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/${POSTGRES_DB:-sapientia}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: ${API_IMAGE:-sapientia-api:local}
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    environment:
      <<: *app-env
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      object-storage:
        condition: service_healthy
      object-storage-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    image: ${API_IMAGE:-sapientia-api:local}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    command: pnpm --filter @sapientia/api worker:start
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      object-storage:
        condition: service_healthy
      object-storage-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE:-sapientia-web:local}
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  redis_data:
  object_storage_data:
  object_storage_logs:
