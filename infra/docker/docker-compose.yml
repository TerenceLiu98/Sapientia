name: sapientia-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sapientia
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: sapientia_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sapientia"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dev_admin
      MINIO_ROOT_PASSWORD: dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 dev_admin dev_password &&
      mc mb -p local/sapientia &&
      mc anonymous set none local/sapientia
      "

# Optional: run the BullMQ worker in docker. Default dev workflow runs it on
# the host via `pnpm worker:dev` so Bun's fast-restart is available; uncomment
# only if you want background processing while iterating on the frontend
# without an extra terminal.
#
# worker:
#   build:
#     context: ../..
#     dockerfile: apps/api/Dockerfile
#   command: bun src/worker.ts
#   environment:
#     NODE_ENV: development
#     LOG_LEVEL: info
#     DATABASE_URL: postgresql://sapientia:dev_password@postgres:5432/sapientia_dev
#     REDIS_URL: redis://redis:6379
#     S3_ENDPOINT: http://minio:9000
#     S3_ACCESS_KEY_ID: dev_admin
#     S3_SECRET_ACCESS_KEY: dev_password
#     S3_BUCKET: sapientia
#     S3_REGION: us-east-1
#     S3_FORCE_PATH_STYLE: "true"
#     BETTER_AUTH_SECRET: change_me_to_a_real_secret_at_least_32_chars
#     BETTER_AUTH_URL: http://localhost:3000
#   depends_on:
#     postgres:
#       condition: service_healthy
#     redis:
#       condition: service_healthy
#     minio:
#       condition: service_healthy

volumes:
  postgres_data:
  minio_data:
